<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velframe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #e0e0e0; font-family: 'Courier New', monospace; }
    
    .topbar {
      background: #111;
      border-bottom: 1px solid #222;
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .topbar-title { color: #00ff88; font-size: 16px; font-weight: bold; }
    .topbar-stats { font-size: 12px; color: #555; }

    .tabs {
      display: flex;
      background: #111;
      border-bottom: 1px solid #222;
      padding: 0 24px;
    }
    .tab {
      padding: 12px 20px;
      cursor: pointer;
      font-size: 13px;
      color: #555;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab:hover { color: #aaa; }
    .tab.active { color: #00ff88; border-bottom-color: #00ff88; }

    .content { padding: 24px; max-width: 1200px; }
    .pane { display: none; }
    .pane.active { display: block; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }

    .card {
      background: #111;
      border: 1px solid #1a1a1a;
      border-radius: 8px;
      padding: 16px;
    }
    .card-label { font-size: 11px; color: #555; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
    .card-value { font-size: 24px; color: #e0e0e0; }
    .card-sub { font-size: 12px; color: #555; margin-top: 4px; }

    .services { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .service {
      background: #111;
      border: 1px solid #1a1a1a;
      border-radius: 8px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .service-name { font-size: 13px; color: #aaa; }
    .service-status { font-size: 11px; padding: 4px 10px; border-radius: 4px; }
    .status-active { background: #00ff8820; color: #00ff88; }
    .status-inactive { background: #ff444420; color: #ff4444; }

    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.8; }
    .btn-green { background: #00ff8820; color: #00ff88; border: 1px solid #00ff8840; }
    .btn-yellow { background: #ffaa0020; color: #ffaa00; border: 1px solid #ffaa0040; }
    .btn-red { background: #ff444420; color: #ff4444; border: 1px solid #ff444440; }
    .btn-blue { background: #00aaff20; color: #00aaff; border: 1px solid #00aaff40; }

    .btn-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }

    .log-box {
      background: #0d0d0d;
      border: 1px solid #1a1a1a;
      border-radius: 8px;
      padding: 16px;
      height: 400px;
      overflow-y: auto;
      font-size: 12px;
      line-height: 1.6;
      color: #666;
      white-space: pre-wrap;
    }

    .section-title { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #00ff88; margin-bottom: 16px; }

    .query-item {
      padding: 8px 12px;
      border-bottom: 1px solid #1a1a1a;
      font-size: 12px;
      color: #666;
    }
    .query-item:last-child { border-bottom: none; }

    .progress-bar {
      height: 4px;
      background: #1a1a1a;
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #00ff88;
      border-radius: 2px;
      transition: width 0.3s;
    }

    select {
      background: #111;
      border: 1px solid #222;
      color: #aaa;
      padding: 6px 12px;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      margin-bottom: 12px;
    }

    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #111;
      border: 1px solid #00ff88;
      color: #00ff88;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 999;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">Velframe — Aveltura Control Panel</div>
  <div class="topbar-stats" id="topbar-stats">loading...</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('overview')">Overview</div>
  <div class="tab" onclick="switchTab('services')">Services</div>
  <div class="tab" onclick="switchTab('scraper')">Scraper</div>
  <div class="tab" onclick="switchTab('logs')">Logs</div>
  <div class="tab" onclick="switchTab('queries')">Queries</div>
  <div class="tab" onclick="switchTab('system')">System</div>
</div>

<div class="content">

  <!-- Overview -->
  <div class="pane active" id="pane-overview">
    <div class="grid" id="overview-cards"></div>
    <div class="section-title">Services</div>
    <div class="services" id="overview-services"></div>
    <div class="btn-row">
      <button class="btn btn-yellow" onclick="restartService('vel')">Restart Vel</button>
      <button class="btn btn-yellow" onclick="restartService('ollama')">Restart Ollama</button>
      <button class="btn btn-red" onclick="restartAll()">Restart All</button>
      <button class="btn btn-blue" onclick="resetFaillock()">Reset Faillock</button>
    </div>
  </div>

  <!-- Services -->
  <div class="pane" id="pane-services">
    <div class="section-title">Service Control</div>
    <div class="services" id="services-list"></div>
  </div>

  <!-- Scraper -->
  <div class="pane" id="pane-scraper">
    <div class="section-title">Database</div>
    <div class="grid" id="scraper-cards"></div>
    <div class="section-title">Controls</div>
    <div class="btn-row">
      <button class="btn btn-green" onclick="runScript('scraper')">Run Scraper</button>
      <button class="btn btn-green" onclick="runScript('discovery')">Run Discovery</button>
      <button class="btn btn-yellow" onclick="runScript('cleaner')">Run Cleaner</button>
      <button class="btn btn-green" onclick="runScript('ingest')">Ingest Files</button>
      <button class="btn btn-yellow" onclick="runScript('backup')">Backup</button>
      <button class="btn btn-red" onclick="runFullPipeline()">Full Pipeline</button>
    </div>
    <div class="log-box" id="scraper-log">Ready.</div>
  </div>

  <!-- Logs -->
  <div class="pane" id="pane-logs">
    <div class="section-title">Service Logs</div>
    <select id="log-service-select" onchange="loadLogs()">
      <option value="vel">vel</option>
      <option value="ollama">ollama</option>
      <option value="vel-watchdog">vel-watchdog</option>
      <option value="docker">docker</option>
    </select>
    <button class="btn btn-blue" onclick="loadLogs()" style="margin-left:8px">Refresh</button>
    <div class="log-box" id="log-output">Select a service to view logs.</div>
  </div>

  <!-- Queries -->
  <div class="pane" id="pane-queries">
    <div class="section-title">Query History</div>
    <div id="query-total" style="font-size:13px;color:#555;margin-bottom:16px"></div>
    <div class="log-box" id="query-list"></div>
  </div>

  <!-- System -->
  <div class="pane" id="pane-system">
    <div class="section-title">System Info</div>
    <div class="grid" id="system-cards"></div>
  </div>

</div>

<div id="toast"></div>

<script>
let API_KEY = localStorage.getItem("velframe_key");
if (!API_KEY) {
  API_KEY = prompt("Enter Velframe API key:") || "";
  localStorage.setItem("velframe_key", API_KEY);
}

async function api(path, method="GET", body=null) {
  const opts = {
    method,
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${API_KEY}`
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  return r.json();
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

function switchTab(name) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".pane").forEach(p => p.classList.remove("active"));
  event.target.classList.add("active");
  document.getElementById(`pane-${name}`).classList.add("active");
  if (name === "logs") loadLogs();
  if (name === "queries") loadQueries();
}

async function loadStatus() {
  const data = await fetch("/api/status").then(r => r.json());
  
  // Topbar
  document.getElementById("topbar-stats").textContent = 
    `CPU: ${data.system.cpu_percent}% | RAM: ${data.system.ram_used}GB/${data.system.ram_total}GB | Disk: ${data.system.disk_used}GB/${data.system.disk_total}GB`;

  // Overview cards
  document.getElementById("overview-cards").innerHTML = `
    <div class="card"><div class="card-label">Engines</div><div class="card-value">${data.db.engines}</div></div>
    <div class="card"><div class="card-label">Mods</div><div class="card-value">${data.db.mods}</div></div>
    <div class="card"><div class="card-label">Total Rows</div><div class="card-value">${data.db.rows}</div></div>
    <div class="card"><div class="card-label">Index Version</div><div class="card-value">v${data.db.index_version}</div></div>
  `;

  // Services
  const servicesHtml = Object.entries(data.services).map(([name, status]) => `
    <div class="service">
      <span class="service-name">${name}</span>
      <span class="service-status ${status === 'active' ? 'status-active' : 'status-inactive'}">${status}</span>
    </div>
  `).join("");
  document.getElementById("overview-services").innerHTML = servicesHtml;
  document.getElementById("services-list").innerHTML = servicesHtml;

  // Scraper cards
  document.getElementById("scraper-cards").innerHTML = `
    <div class="card"><div class="card-label">Engines</div><div class="card-value">${data.db.engines}</div><div class="card-sub">${data.db.rows} total rows</div></div>
    <div class="card"><div class="card-label">Mods</div><div class="card-value">${data.db.mods}</div></div>
    <div class="card"><div class="card-label">Index</div><div class="card-value">v${data.db.index_version}</div><div class="card-sub">${data.db.last_built ? data.db.last_built.substring(0,16) : 'never'}</div></div>
    <div class="card"><div class="card-label">Last Scrape</div><div class="card-value" style="font-size:12px;margin-top:4px">${data.db.last_scrape.substring(0,40)}</div></div>
  `;

  // System cards
  document.getElementById("system-cards").innerHTML = `
    <div class="card">
      <div class="card-label">CPU</div>
      <div class="card-value">${data.system.cpu_percent}%</div>
      <div class="card-sub">${data.system.cpu_cores} cores @ ${data.system.cpu_freq}MHz</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${data.system.cpu_percent}%"></div></div>
    </div>
    <div class="card">
      <div class="card-label">RAM</div>
      <div class="card-value">${data.system.ram_used}GB</div>
      <div class="card-sub">${data.system.ram_total}GB total (${data.system.ram_percent}%)</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${data.system.ram_percent}%"></div></div>
    </div>
    <div class="card">
      <div class="card-label">Disk</div>
      <div class="card-value">${data.system.disk_used}GB</div>
      <div class="card-sub">${data.system.disk_total}GB total (${data.system.disk_percent}%)</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${data.system.disk_percent}%"></div></div>
    </div>
    <div class="card">
      <div class="card-label">Uptime</div>
      <div class="card-value" style="font-size:16px;margin-top:4px">${data.system.uptime}</div>
    </div>
  `;
}

async function restartService(service) {
  toast(`Restarting ${service}...`);
  await api(`/api/restart/${service}`, "POST");
  toast(`${service} restarted`);
  loadStatus();
}

async function restartAll() {
  toast("Restarting all services...");
  for (const s of ["ollama", "vel", "vel-watchdog"]) {
    await api(`/api/restart/${s}`, "POST");
  }
  toast("All services restarted");
  loadStatus();
}

async function resetFaillock() {
  await api("/api/faillock/reset", "POST");
  toast("Faillock reset");
}

async function runScript(script) {
  const log = document.getElementById("scraper-log");
  log.textContent = `Running ${script}...\n`;
  toast(`Running ${script}...`);
  const data = await api(`/api/run/${script}`, "POST");
  log.textContent = data.output || data.errors || "Done";
  log.scrollTop = log.scrollHeight;
  toast(`${script} complete`);
  loadStatus();
}

async function runFullPipeline() {
  const log = document.getElementById("scraper-log");
  log.textContent = "Running full pipeline...\n";
  for (const script of ["backup", "scraper", "discovery", "cleaner", "ingest"]) {
    log.textContent += `\nRunning ${script}...\n`;
    const data = await api(`/api/run/${script}`, "POST");
    log.textContent += data.output || "";
    log.scrollTop = log.scrollHeight;
  }
  log.textContent += "\nFull pipeline complete.";
  toast("Pipeline complete");
  loadStatus();
}

async function loadLogs() {
  const service = document.getElementById("log-service-select").value;
  const data = await fetch(`/api/logs/${service}`).then(r => r.json());
  document.getElementById("log-output").textContent = data.logs;
}

async function loadQueries() {
  const data = await fetch("/api/queries").then(r => r.json());
  document.getElementById("query-total").textContent = `Total queries: ${data.total}`;
  document.getElementById("query-list").innerHTML = data.recent.reverse().map(q => 
    `<div class="query-item">${q}</div>`
  ).join("");
}

// Init
loadStatus();
setInterval(loadStatus, 10000);
</script>
</body>
</html>
